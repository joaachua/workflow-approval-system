users:
  get:
    summary: List users
    tags:
      - Users
    parameters:
      - in: query
        name: page
        required: false
        schema:
          type: integer
          example: 1
      - in: query
        name: perPage
        required: false
        schema:
          type: integer
          example: 10
    responses:
      "200":
        description: Users retrieved successfully

  post:
    summary: Create user
    tags:
      - Users
    responses:
      "201":
        description: User created successfully

userById:
  get:
    summary: Get user details
    tags:
      - Users
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          example: 1
    responses:
      "200":
        description: User details retrieved successfully
      "404":
        description: User not found

  put:
    summary: Update user
    tags:
      - Users
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          example: 1
    responses:
      "200":
        description: User updated successfully
      "404":
        description: User not found

  delete:
    summary: Delete user
    tags:
      - Users
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          example: 1
    responses:
      "200":
        description: User deleted successfully
      "404":
        description: User not found